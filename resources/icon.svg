<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Kanban columns (top half) -->
  <!-- Column 1 -->
  <rect x="72" y="72" width="100" height="44" rx="10" fill="url(#card)"/>
  <rect x="72" y="124" width="100" height="56" rx="10" fill="url(#card)"/>
  <rect x="72" y="188" width="100" height="36" rx="10" fill="url(#card)"/>

  <!-- Column 2 -->
  <rect x="188" y="72" width="116" height="52" rx="10" fill="url(#card)"/>
  <rect x="188" y="132" width="116" height="68" rx="10" fill="url(#card)"/>

  <!-- Column 3 -->
  <rect x="320" y="72" width="104" height="64" rx="10" fill="url(#card)"/>
  <rect x="320" y="144" width="104" height="44" rx="10" fill="rgba(255,255,255,0.35)"/>

  <!-- Familiar creature (cat silhouette) — geometric, minimal -->
  <g transform="translate(180, 268)">
    <!-- Body — simple oval -->
    <ellipse cx="76" cy="120" rx="52" ry="40" fill="rgba(255,255,255,0.22)"/>

    <!-- Head — circle -->
    <circle cx="76" cy="72" r="36" fill="rgba(255,255,255,0.22)"/>

    <!-- Left ear — triangle -->
    <polygon points="48,44 56,8 68,40" fill="rgba(255,255,255,0.22)"/>
    <!-- Right ear — triangle -->
    <polygon points="84,40 96,8 104,44" fill="rgba(255,255,255,0.22)"/>

    <!-- Eyes — two glowing diamonds -->
    <rect x="58" y="64" width="10" height="10" rx="1" transform="rotate(45 63 69)" fill="#A78BFA"/>
    <rect x="84" y="64" width="10" height="10" rx="1" transform="rotate(45 89 69)" fill="#A78BFA"/>

    <!-- Tail — curved line -->
    <path d="M128,120 Q160,100 148,60" stroke="rgba(255,255,255,0.22)" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
