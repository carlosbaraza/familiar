<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="200" y1="60" x2="780" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="200" rx="16" fill="url(#bannerBg)"/>

  <!-- Icon with kanban + familiar creature -->
  <g transform="translate(20, 20)">
    <rect width="160" height="160" rx="36" fill="url(#iconBg)"/>
    <rect width="160" height="160" rx="36" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

    <!-- Kanban columns (top) -->
    <rect x="16" y="18" width="30" height="14" rx="3" fill="url(#cardFill)"/>
    <rect x="16" y="36" width="30" height="18" rx="3" fill="url(#cardFill)"/>

    <rect x="52" y="18" width="36" height="16" rx="3" fill="url(#cardFill)"/>
    <rect x="52" y="38" width="36" height="22" rx="3" fill="url(#cardFill)"/>

    <rect x="94" y="18" width="32" height="20" rx="3" fill="url(#cardFill)"/>
    <rect x="94" y="42" width="32" height="12" rx="3" fill="rgba(255,255,255,0.4)"/>

    <!-- Familiar creature (geometric cat) — bottom half of icon -->
    <g transform="translate(44, 72)">
      <!-- Body -->
      <ellipse cx="36" cy="52" rx="28" ry="20" fill="rgba(255,255,255,0.2)"/>
      <!-- Head -->
      <circle cx="36" cy="28" r="18" fill="rgba(255,255,255,0.2)"/>
      <!-- Left ear -->
      <polygon points="22,16 26,0 32,14" fill="rgba(255,255,255,0.2)"/>
      <!-- Right ear -->
      <polygon points="40,14 46,0 50,16" fill="rgba(255,255,255,0.2)"/>
      <!-- Eyes -->
      <rect x="27" y="24" width="5" height="5" rx="0.5" transform="rotate(45 29.5 26.5)" fill="#A78BFA"/>
      <rect x="40" y="24" width="5" height="5" rx="0.5" transform="rotate(45 42.5 26.5)" fill="#A78BFA"/>
      <!-- Tail -->
      <path d="M64,52 Q80,40 74,24" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Text: Familiar -->
  <text x="210" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" letter-spacing="-2" fill="url(#textGrad)">
    Familiar
  </text>

  <!-- Tagline -->
  <text x="214" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" fill="rgba(167,139,250,0.7)">
    Your AI agents, at your command
  </text>
</svg>
